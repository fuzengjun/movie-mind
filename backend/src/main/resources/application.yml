server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: backend
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:movie_mind}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:movie_mind}
    password: ${DB_PASSWORD:MovieMind123!}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null

app:
  cache:
    redis:
      enabled: ${REDIS_ENABLED:false}

tmdb:
  base-url: ${TMDB_BASE_URL:https://api.themoviedb.org/3}
  fallback-base-url: ${TMDB_FALLBACK_BASE_URL:https://api.tmdb.org/3}
  image-base-url: ${TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p/w780}
  read-access-token: ${TMDB_READ_ACCESS_TOKEN:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
  model: ${DEEPSEEK_MODEL:deepseek-chat}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
