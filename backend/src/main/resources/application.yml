server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:movie_mind}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:movie_mind}
    password: ${DB_PASSWORD:MovieMind123!}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null

tmdb:
  base-url: ${TMDB_BASE_URL:https://api.themoviedb.org/3}
  image-base-url: ${TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p/w780}
  read-access-token: ${TMDB_READ_ACCESS_TOKEN:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  swagger-ui:
    path: /swagger-ui.html
