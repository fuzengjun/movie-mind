# 可提交的本地开发公共配置。账号、密码与 Token 请写入 application-local-secret.yml。
# 首次使用请复制 application-local-secret.example.yml。

server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-local-secret.yml
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/movie_mind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
  data:
    redis:
      host: 127.0.0.1
      port: 6379

app:
  cache:
    redis:
      enabled: true

tmdb:
  base-url: https://api.themoviedb.org/3
  fallback-base-url: https://api.tmdb.org/3
  image-base-url: https://image.tmdb.org/t/p/w780
