# Windows 本地开发可复制为 application-local.yml 后自行修改
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/movie_mind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: movie_mind
    password: MovieMind123!
  data:
    redis:
      host: 127.0.0.1
      port: 6379

app:
  cache:
    redis:
      enabled: false

# 若本机可用 Redis，可改为 true，并按需修改上面的 host/port
# 也可以通过环境变量 REDIS_ENABLED=true 打开缓存

tmdb:
  read-access-token: YOUR_TMDB_READ_ACCESS_TOKEN
  base-url: https://api.themoviedb.org/3
  image-base-url: https://image.tmdb.org/t/p/w780
